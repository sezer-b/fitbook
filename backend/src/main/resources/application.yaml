spring.application.name: backend

spring:
  datasource:
    url: jdbc:postgresql://localhost:5439/postgres
    username: fitbook
    password: fitbook
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  devtools:
    restart:
      enabled: false

security:
  jwt:
    secret: local-dev-secret-key-that-is-long-enough-for-hs256
    expiration-ms: 86400000
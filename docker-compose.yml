services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: blueprint
      POSTGRES_PASSWORD: blueprint
    ports:
      - "5439:5432"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_NAME: postgres
      DB_USER: blueprint
      DB_PASSWORD: blueprint
    depends_on:
      - db